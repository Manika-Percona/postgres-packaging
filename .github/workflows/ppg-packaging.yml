name: PG Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: package name to be built
        required: true
        default: postgres
        type: choice
        options:
          - etcd
          - patroni
          - pg_gather
          - pg_repack
          - pg_tde
          - pgaudit
          - pgaudit_set_user
          - pgbackrest
          - pgbadger
          - pgbouncer
          - pgpool2
          - pgvector
          - postgis
          - postgres
          - postgres-common
          - ppg-server
          - ppg-server-ha
          - pysyncobj
          - wal2json
          - ydiff

      packaging-repo:
        description: packaging repo to be used
        default: Manika-Percona/postgres-packaging
        required: true

      packaging-branch:
        description: packaging branch to be used
        default: main
        required: true

      ppg-repo:
        description: ppg repo to be enabled
        required: true
        default: ppg-16.13
        type: choice
        options:
          - ppg-18.3
          - ppg-17.9
          - ppg-16.13
          - ppg-15.17
          - ppg-14.22

      ppg-repo-type:
        description: ppg repo type
        required: true
        default: experimental
        type: choice
        options:
          - experimental
          - testing

      pg-major:
        description: Postgres major version for which package will be built
        required: true
        default: "16"
        type: choice
        options:
          - "18"
          - "17"
          - "16"
          - "15"
          - "14"

      arch:
        description: architecture
        required: true
        default: amd64
        type: choice
        options:
          - amd64
          - arm64

      debugging:
        description: tmate session required
        default: false
        type: boolean
        
jobs:
  prepare:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout packaging repo
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
         repository: ${{ inputs.packaging-repo }}
         ref: ${{ inputs.packaging-branch }}
         path: postgres-packaging
        
     - name: Create archive of packaging files
       run: |
        mkdir pkg
        if [[ "${{ inputs.package }}" = "postgres" ]]; then
         cp postgres-packaging/${{ inputs.package }}/ppg_builder.sh pkg/pkg-builder.sh
        elif [[ "${{ inputs.package }}" = "etcd" || "${{ inputs.package }}" = "haproxy" || "${{ inputs.package }}" = "pgbadger" || "${{ inputs.package }}" = "pysyncobj" || "${{ inputs.package }}" = "ydiff" ]]; then
         cp postgres-packaging/common/${{ inputs.package }}/*builder.sh pkg/pkg-builder.sh
        else
         cp postgres-packaging/non-common/${{ inputs.package }}/*builder.sh pkg/pkg-builder.sh
        fi
        cp postgres-packaging/common-functions.sh pkg/
        cp postgres-packaging/install-deps.sh pkg/
        cp postgres-packaging/versions.sh pkg/
       shell: bash

     - name: Upload build files as artifact
       uses: actions/upload-artifact@v4
       with:
         name: build-files
         path: pkg/

  build-source-tarball:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Get build script artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./

      - name: Create a working directory
        run: mkdir ${{ inputs.package }}

      - name: Copy build script in required directories
        run: |
          cp pkg-builder.sh ${{ inputs.package }}/
          cp common-functions.sh ${{ inputs.package }}/
          cp install-deps.sh ${{ inputs.package }}/
          cp versions.sh ${{ inputs.package }}/ 
        shell: bash

      - name: Update permissions of the build scripts
        run: |
          chmod 755 ${{ inputs.package }}/*
        shell: bash

      - name: Set Build ID
        run: echo "BUILD_ID=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build Sources
        run: |
          cd ${{ inputs.package }}
          mkdir test
          sudo ./pkg-builder.sh --builddir=$(pwd)/test --get_sources=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Set uploadPath for internal server (repo.ci)
        run: |
          uploadPath=$(grep "UPLOAD" ${{ inputs.package }}/test/${{ inputs.package }}.properties | cut -d = -f 2)
          echo "UPLOADPATH=$uploadPath" >> "$GITHUB_OUTPUT"

      - name: Upload source tarballs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-source_tarball
          path: ${{ inputs.package }}/source_tarball

  build-srpm-sdeb:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare, build-source-tarball]

    strategy:
      fail-fast: false
      matrix:
        platform:
          - oraclelinux:8
          - ubuntu:jammy

    container:
      image: ${{ matrix.platform }}

    steps:
      - name: Check OS
        run: cat /etc/os-release

      - name: Install build tools
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            yum install -y gcc make tar rpm-build rpmdevtools git sudo
          else
            apt-get update
            apt-get install -y wget curl gcc tar git build-essential devscripts debhelper fakeroot lintian sudo
          fi
          echo "Ready to build!"

      - name: Get build files from artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./

      - name: Create a working directory
        run: mkdir ${{ inputs.package }}

      - name: Copy build script in required directories
        run: |
          cp pkg-builder.sh ${{ inputs.package }}/
          cp common-functions.sh ${{ inputs.package }}/
          cp install-deps.sh ${{ inputs.package }}/
          cp versions.sh ${{ inputs.package }}/ 
        shell: bash

      - name: Update permissions of the build scripts
        run: |
          chmod 755 ${{ inputs.package }}/*
        shell: bash

      - name: Get source tarball from artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-source_tarball
          path: ${{ inputs.package }}/test/source_tarball/

      - name: Install dependencies
        run: |
          set -xe
          cd ${{ inputs.package }}
          sudo ./pkg-builder.sh --builddir=$(pwd)/test --install_deps=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Build Source RPM/DEB
        run: |
          cd ${{ inputs.package }}
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_src_rpm=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
          else
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_src_deb=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
          fi
        shell: bash

      - name: Upload source rpm as artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-srpm
          path: ${{ inputs.package }}/srpm

      - name: Upload source deb as artifact
        if: ${{ !contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-source_deb
          path: ${{ inputs.package }}/source_deb

  build-rpm-deb:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare, build-source-tarball, build-srpm-sdeb]

    strategy:
      fail-fast: false
      matrix:
        platform:
          - oraclelinux:10
          - oraclelinux:9
          - oraclelinux:8
          - ubuntu:noble
          - ubuntu:jammy
          - debian:bookworm
          - debian:bullseye
          - debian:trixie

    container:
      image: ${{ matrix.platform }}

    steps:
      - name: Check OS
        run: cat /etc/os-release

      - name: Install build tools
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            yum install -y gcc make tar rpm-build rpmdevtools git sudo
          else
            apt-get update
            apt-get install -y wget curl gcc tar git build-essential devscripts debhelper fakeroot lintian sudo
          fi
          echo "Ready to build!"

      - name: Get build script artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./

      - name: Create a working directory
        run: mkdir ${{ inputs.package }}

      - name: Copy build script in required directories
        run: |
          cp pkg-builder.sh ${{ inputs.package }}/
          cp common-functions.sh ${{ inputs.package }}/
          cp install-deps.sh ${{ inputs.package }}/
          cp versions.sh ${{ inputs.package }}/ 
        shell: bash

      - name: Update permissions of the build scripts
        run: |
          chmod 755 ${{ inputs.package }}/*
        shell: bash

      - name: Enable ppg repo
        if: ${{ inputs.package != 'postgres' }}
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            yum -y install https://repo.percona.com/yum/percona-release-latest.noarch.rpm
          else
            wget https://repo.percona.com/apt/percona-release_latest.generic_all.deb
            dpkg -i percona-release_latest.generic_all.deb
            rm -f percona-release_latest.generic_all.deb
          fi
          percona-release disable all
          percona-release enable ${{ inputs.ppg-repo }} ${{ inputs.ppg-repo-type }}

      - name: Get source tarball from artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-source_tarball
          path: ${{ inputs.package }}/test/source_tarball/

      - name: Get source rpm from artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-srpm
          path: ${{ inputs.package }}/test/srpm/

      - name: Get source deb from artifact
        if: ${{ !contains(matrix.platform, 'linux') }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-source_deb
          path: ${{ inputs.package }}/test/source_deb/

      - name: Install dependencies
        run: |
          set -xe
          cd ${{ inputs.package }}
          sudo ./pkg-builder.sh --builddir=$(pwd)/test --install_deps=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Build RPM/DEB
        run: |
          cd ${{ inputs.package }}
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_rpm=1 --pg_major=${{ inputs.pg-major }}
          else
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_deb=1 --pg_major=${{ inputs.pg-major }}
          fi
        shell: bash

      - name: Archive final rpm/deb packages
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            cp -r ${{ inputs.package }}/rpm .
            tar -cvf rpm.tar rpm/
          else
            cp -r ${{ inputs.package }}/deb .
            tar -cvf deb.tar deb/
          fi
        shell: bash

      - name: Compute platform label
        run: |
          PLATFORM="${{ matrix.platform }}"
          if [[ "$PLATFORM" == *linux* ]]; then
            echo "PLATFORM_LABEL=ol${PLATFORM##*:}" >> "$GITHUB_ENV"
          else
            echo "PLATFORM_LABEL=${PLATFORM##*:}" >> "$GITHUB_ENV"
          fi
        shell: bash

      - name: Upload rpm tar as artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ env.PLATFORM_LABEL }}-rpm-archive
          path: ./rpm.tar

      - name: Upload deb tar as artifact
        if: ${{ !contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ env.PLATFORM_LABEL }}-deb-archive
          path: ./deb.tar

      - name: enable tmate debugging
        if: inputs.debugging && failure()
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60

  upload:
    runs-on: ubuntu-latest
    needs: [prepare, build-source-tarball, build-srpm-sdeb, build-rpm-deb]

    steps:
     - name: Get Upload Path for repo.ci
       run: echo $UPLOADPATH