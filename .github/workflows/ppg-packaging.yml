name: PG Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: package name to be built
        required: true
        default: postgres
        type: choice
        options:
          - etcd
          - patroni
          - pg_gather
          - pg_repack
          - pg_tde
          - pgaudit
          - pgaudit_set_user
          - pgbackrest
          - pgbadger
          - pgbouncer
          - pgpool2
          - pgvector
          - postgis
          - postgres
          - postgres-common
          - ppg-server
          - ppg-server-ha
          - pysyncobj
          - wal2json
          - ydiff

      packaging-repo:
        description: packaging repo to be used
        default: Manika-Percona/postgres-packaging
        required: true

      packaging-branch:
        description: packaging branch to be used
        default: main
        required: true

      ppg-repo:
        description: ppg repo to be enabled
        required: true
        default: ppg-16.13
        type: choice
        options:
          - ppg-18.3
          - ppg-17.9
          - ppg-16.13
          - ppg-15.17
          - ppg-14.22

      ppg-repo-type:
        description: ppg repo type
        required: true
        default: experimental
        type: choice
        options:
          - experimental
          - testing

      pg-major:
        description: Postgres major version for which package will be built
        required: true
        default: "16"
        type: choice
        options:
          - "18"
          - "17"
          - "16"
          - "15"
          - "14"

      arch:
        description: architecture
        required: true
        default: amd64
        type: choice
        options:
          - amd64
          - arm64

      debugging:
        description: tmate session required
        default: false
        type: boolean
        
jobs:
  prepare:
   runs-on: ubuntu-latest
   outputs:
      COMP_VERSION: ${{ steps.set_version.outputs.version }}

   steps:
     - name: Checkout packaging repo
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
         repository: ${{ inputs.packaging-repo }}
         ref: ${{ inputs.packaging-branch }}
         path: postgres-packaging
        
     - name: Create archive of packaging files
       run: |
        mkdir pkg
        if [[ "${{ inputs.package }}" = "postgres" ]]; then
         cp postgres-packaging/${{ inputs.package }}/ppg_builder.sh pkg/pkg-builder.sh
        elif [[ "${{ inputs.package }}" = "etcd" || "${{ inputs.package }}" = "haproxy" || "${{ inputs.package }}" = "pgbadger" || "${{ inputs.package }}" = "pysyncobj" || "${{ inputs.package }}" = "ydiff" ]]; then
         cp postgres-packaging/common/${{ inputs.package }}/*builder.sh pkg/pkg-builder.sh
        else
         cp postgres-packaging/non-common/${{ inputs.package }}/*builder.sh pkg/pkg-builder.sh
        fi
        cp postgres-packaging/common-functions.sh pkg/
        cp postgres-packaging/install-deps.sh pkg/
        cp postgres-packaging/versions.sh pkg/
       shell: bash

     - name: Set Component version
       id: set_version
       run: echo "version=$(grep 'ETCD_VERSION=' pkg/versions.sh | cut -d '=' -f2)" >> "$GITHUB_OUTPUT"

     - name: Upload build files as artifact
       uses: actions/upload-artifact@v4
       with:
         name: build-files
         path: pkg/

  build-source-tarball:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      UPLOADPATH: ${{ steps.set_uploadPath.outputs.uploadPath }}

    steps:
      - name: Get build script artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./

      - name: Create a working directory
        run: mkdir ${{ inputs.package }}

      - name: Copy build script in required directories
        run: |
          cp pkg-builder.sh ${{ inputs.package }}/
          cp common-functions.sh ${{ inputs.package }}/
          cp install-deps.sh ${{ inputs.package }}/
          cp versions.sh ${{ inputs.package }}/ 
        shell: bash

      - name: Update permissions of the build scripts
        run: |
          chmod 755 ${{ inputs.package }}/*
        shell: bash

      - name: Set Build ID
        run: echo "BUILD_ID=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build Sources
        run: |
          cd ${{ inputs.package }}
          mkdir test
          sudo -E ./pkg-builder.sh --builddir=$(pwd)/test --get_sources=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Set uploadPath for internal server (repo.ci)
        id: set_uploadPath
        run: |
          uploadPath=$(grep "UPLOAD" ${{ inputs.package }}/test/${{ inputs.package }}.properties | cut -d = -f 2)
          echo "uploadPath=$uploadPath" >> "$GITHUB_OUTPUT"

      - name: Upload source tarballs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-source_tarball
          path: ${{ inputs.package }}/source_tarball

  build-srpm-sdeb:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare, build-source-tarball]

    strategy:
      fail-fast: false
      matrix:
        platform:
          - oraclelinux:8
          - ubuntu:jammy

    container:
      image: ${{ matrix.platform }}

    steps:
      - name: Check OS
        run: cat /etc/os-release

      - name: Install build tools
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            yum install -y gcc make tar rpm-build rpmdevtools git sudo
          else
            apt-get update
            apt-get install -y wget curl gcc tar git build-essential devscripts debhelper fakeroot lintian sudo
          fi
          echo "Ready to build!"

      - name: Get build files from artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./

      - name: Create a working directory
        run: mkdir ${{ inputs.package }}

      - name: Copy build script in required directories
        run: |
          cp pkg-builder.sh ${{ inputs.package }}/
          cp common-functions.sh ${{ inputs.package }}/
          cp install-deps.sh ${{ inputs.package }}/
          cp versions.sh ${{ inputs.package }}/ 
        shell: bash

      - name: Update permissions of the build scripts
        run: |
          chmod 755 ${{ inputs.package }}/*
        shell: bash

      - name: Get source tarball from artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-source_tarball
          path: ${{ inputs.package }}/test/source_tarball/

      - name: Install dependencies
        run: |
          set -xe
          cd ${{ inputs.package }}
          sudo ./pkg-builder.sh --builddir=$(pwd)/test --install_deps=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Build Source RPM/DEB
        run: |
          cd ${{ inputs.package }}
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_src_rpm=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
          else
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_src_deb=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
          fi
        shell: bash

      - name: Upload source rpm as artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-srpm
          path: ${{ inputs.package }}/srpm

      - name: Upload source deb as artifact
        if: ${{ !contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-source_deb
          path: ${{ inputs.package }}/source_deb

  build-rpm-deb:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare, build-source-tarball, build-srpm-sdeb]

    strategy:
      fail-fast: false
      matrix:
        platform:
          - oraclelinux:10
          - oraclelinux:9
          - oraclelinux:8
          - ubuntu:noble
          - ubuntu:jammy
          - debian:bookworm
          - debian:bullseye
          - debian:trixie

    container:
      image: ${{ matrix.platform }}

    steps:
      - name: Check OS
        run: cat /etc/os-release

      - name: Install build tools
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            yum install -y gcc make tar rpm-build rpmdevtools git sudo
          else
            apt-get update
            apt-get install -y wget curl gcc tar git build-essential devscripts debhelper fakeroot lintian sudo
          fi
          echo "Ready to build!"

      - name: Get build script artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./

      - name: Create a working directory
        run: mkdir ${{ inputs.package }}

      - name: Copy build script in required directories
        run: |
          cp pkg-builder.sh ${{ inputs.package }}/
          cp common-functions.sh ${{ inputs.package }}/
          cp install-deps.sh ${{ inputs.package }}/
          cp versions.sh ${{ inputs.package }}/ 
        shell: bash

      - name: Update permissions of the build scripts
        run: |
          chmod 755 ${{ inputs.package }}/*
        shell: bash

      - name: Enable ppg repo
        if: ${{ inputs.package != 'postgres' }}
        run: |
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            yum -y install https://repo.percona.com/yum/percona-release-latest.noarch.rpm
          else
            wget https://repo.percona.com/apt/percona-release_latest.generic_all.deb
            dpkg -i percona-release_latest.generic_all.deb
            rm -f percona-release_latest.generic_all.deb
          fi
          percona-release disable all
          percona-release enable ${{ inputs.ppg-repo }} ${{ inputs.ppg-repo-type }}

      - name: Get source tarball from artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-source_tarball
          path: ${{ inputs.package }}/test/source_tarball/

      - name: Get source rpm from artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-srpm
          path: ${{ inputs.package }}/test/srpm/

      - name: Get source deb from artifact
        if: ${{ !contains(matrix.platform, 'linux') }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package }}-source_deb
          path: ${{ inputs.package }}/test/source_deb/

      - name: Install dependencies
        run: |
          set -xe
          cd ${{ inputs.package }}
          sudo ./pkg-builder.sh --builddir=$(pwd)/test --install_deps=1 --repo_component=${{ inputs.ppg-repo-type }} --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Build RPM/DEB
        run: |
          cd ${{ inputs.package }}
          if [[ "${{ matrix.platform }}" == *"linux"* ]]; then
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_rpm=1 --pg_major=${{ inputs.pg-major }}
          else
            sudo ./pkg-builder.sh --builddir=$(pwd)/test --build_deb=1 --pg_major=${{ inputs.pg-major }}
          fi
        shell: bash

      - name: Compute platform label
        run: |
          PLATFORM="${{ matrix.platform }}"
          if [[ "$PLATFORM" == *linux* ]]; then
            echo "PLATFORM_LABEL=ol${PLATFORM##*:}" >> "$GITHUB_ENV"
          else
            echo "PLATFORM_LABEL=${PLATFORM##*:}" >> "$GITHUB_ENV"
          fi
        shell: bash

      - name: Upload rpm tar as artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ env.PLATFORM_LABEL }}-rpms
          path: ${{ inputs.package }}/rpm

      - name: Upload deb tar as artifact
        if: ${{ !contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ env.PLATFORM_LABEL }}-debs
          path: ${{ inputs.package }}/deb

  upload-draft-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-source-tarball, build-srpm-sdeb, build-rpm-deb]

    steps:
     - name: Get package full name and upload path
       run: |
          echo "pkg_name=${{ inputs.package }}-${{ needs.prepare.outputs.COMP_VERSION }}" >> "$GITHUB_ENV"
          echo "UPLOAD_PATH=${{ needs.build-source-tarball.outputs.UPLOADPATH }}" >> "$GITHUB_ENV"

     - name: Create final artifact structure
       run: |
        BASE="${{ env.UPLOAD_PATH }}/source"
        for t in tarball redhat debian; do
          mkdir -p "$BASE/$t"
        done
        BASE="${{ env.UPLOAD_PATH }}/binary"
        for v in 10 9 8; do
          for arch in x86_64 aarch64; do
            mkdir -p "$BASE/redhat/$v/$arch"
          done
        done
        for v in bookworm bullseye jammy noble trixie; do
          for arch in x86_64 aarch64; do
            mkdir -p "$BASE/debian/$v/$arch"
          done
        done

     - name: Get all the artifacts
       uses: actions/download-artifact@v4
       with:
        pattern: ${{ inputs.package }}-*
        path: artifacts

     - name: Copy all the artifacts to required location
       run: |
          cp artifacts/etcd-source_tarball/* "${{ env.UPLOAD_PATH }}/source/tarball"
          cp artifacts/etcd-srpm/* "${{ env.UPLOAD_PATH }}/source/redhat"
          cp artifacts/etcd-source_deb/* "${{ env.UPLOAD_PATH }}/source/debian"
          if [[ "${{ inputs.arch }}" = "amd64" ]]; then
            cp artifacts/etcd-ol8-rpms/* "${{ env.UPLOAD_PATH }}/binary/redhat/8/x86_64"
            cp artifacts/etcd-ol9-rpms/* "${{ env.UPLOAD_PATH }}/binary/redhat/9/x86_64"
            cp artifacts/etcd-ol10-rpms/* "${{ env.UPLOAD_PATH }}/binary/redhat/10/x86_64"
            cp artifacts/etcd-bookworm-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/bookworm/x86_64"
            cp artifacts/etcd-bullseye-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/bullseye/x86_64"
            cp artifacts/etcd-jammy-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/jammy/x86_64"
            cp artifacts/etcd-noble-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/noble/x86_64"
            cp artifacts/etcd-trixie-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/trixie/x86_64"
          else
            cp artifacts/etcd-ol8-rpms/* "${{ env.UPLOAD_PATH }}/binary/redhat/8/aarch64"
            cp artifacts/etcd-ol9-rpms/* "${{ env.UPLOAD_PATH }}/binary/redhat/9/aarch64"
            cp artifacts/etcd-ol10-rpms/* "${{ env.UPLOAD_PATH }}/binary/redhat/10/aarch64"
            cp artifacts/etcd-bookworm-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/bookworm/aarch64"
            cp artifacts/etcd-bullseye-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/bullseye/aarch64"
            cp artifacts/etcd-jammy-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/jammy/aarch64"
            cp artifacts/etcd-noble-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/noble/aarch64"
            cp artifacts/etcd-trixie-debs/* "${{ env.UPLOAD_PATH }}/binary/debian/trixie/aarch64"
          fi

     #- name: Sign RPMs/Debs
     #  run: |
     #     for rpm in ${{ env.pkg_name }}/binary/redhat/*/*/*.rpm; do
     #       signpackage --verbose --password "${SIGN_PASSWORD}" --rpm "$rpm"
     #     done
     #     for deb in ${{ env.pkg_name }}/binary/debian/*/*/*.deb; do
     #       signpackage --verbose --password "${SIGN_PASSWORD}" --deb "$rpm"
     #     done

     - name: Archive final artifact
       run: tar -czf ${{ env.pkg_name }}.tar.gz ${{ inputs.package }}

     - name: Upload final artifact as release artifact
       uses: softprops/action-gh-release@v2
       with:
        draft: true # keep private as they are not signed yet
        files: ${{ env.pkg_name }}.tar.gz

     - name: enable tmate debugging
       if: inputs.debugging && failure()
       uses: mxschmitt/action-tmate@v3
       timeout-minutes: 60